[build]
  base    = "artifacts/health-plan-factory"
  command = "pnpm run build"
  publish = "dist/public"

# API proxy — set VITE_API_BASE_URL in Netlify's environment variables to point
# at the deployed API server (e.g. https://your-api.replit.app).
# The frontend reads VITE_API_BASE_URL at build time and makes API calls
# directly to that origin, so no Netlify-level proxy redirect is needed.
#
# If you have an API server accessible at a fixed URL, you can also add:
#
#   [[redirects]]
#     from   = "/api/*"
#     to     = "https://your-api.replit.app/api/:splat"
#     status = 200
#     force  = true
#
# without VITE_API_BASE_URL — but prefer the env-var approach since it avoids
# the Netlify rewrite layer.

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(self), microphone=(), camera=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://js.stripe.com https://maps.googleapis.com https://*.posthog.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https: blob:; connect-src 'self' https://api.healthplanfactory.com https://*.supabase.co https://api.stripe.com https://*.posthog.com https://maps.googleapis.com; frame-src https://js.stripe.com https://hooks.stripe.com; object-src 'none'; base-uri 'self'; form-action 'self';"
