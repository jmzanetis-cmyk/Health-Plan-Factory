        providerId:
          type: string
      required:
        - providerId

    ProgressLogRecord:
      type: object
      properties:
        id:
          type: string
        profileId:
          type: string
        planId:
          type: string
          nullable: true
        modalityId:
          type: string
          nullable: true
        note:
          type: string
          nullable: true
        rating:
          type: integer
          nullable: true
        sessionDate:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - profileId
        - createdAt

    CreateProgressLogBody:
      type: object
      properties:
        profileId:
          type: string
        planId:
          type: string
        modalityId:
          type: string
        note:
          type: string
        rating:
          type: integer
        mood:
          type: integer
          minimum: 1
          maximum: 10
          description: Self-reported mood score (1-10)
        pain:
          type: integer
          minimum: 1
          maximum: 10
          description: Self-reported pain level (1-10)
        energy:
          type: integer
          minimum: 1
          maximum: 10
          description: Self-reported energy level (1-10)
        sessionDate:
          type: string
          format: date-time
        sessionCostCents:
          type: integer
          minimum: 0
          description: >
            Actual out-of-pocket session cost in cents paid by the member.
            When provided, this amount is deducted from the member's employer
            wellness stipend balance (if enrolled). Do not use modality cost
            estimates for stipend deduction — always supply the real session cost.
      required:
        - profileId

