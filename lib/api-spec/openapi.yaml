openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Health Plan Factory API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: modalities
    description: Wellness modality catalog
  - name: intakes
    description: Member intake submissions
  - name: plans
    description: Generated wellness plans
  - name: providers
    description: Wellness provider directory
  - name: favorites
    description: Member saved providers
  - name: progress
    description: Member progress logs
  - name: admin
    description: Admin operations
  - name: employer
    description: Employer wellness stipend account operations
  - name: employer-admin
    description: Admin management of employer accounts
  - name: Auth
    description: Browser and mobile authentication endpoints.

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /modalities:
    get:
      operationId: listModalities
      tags: [modalities]
      summary: List all active wellness modalities
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: isActive
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: List of modalities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ModalityRecord"
    post:
      operationId: createModality
      tags: [modalities]
      summary: Create a new modality (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateModalityBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModalityRecord"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /intakes:
    get:
      operationId: listIntakes
      tags: [intakes]
      summary: List member intakes (own or admin)
      parameters:
        - name: profileId
          in: query
          required: false
          schema:
            type: string
          description: Filter intakes by member profile ID
      responses:
        "200":
          description: List of intakes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/IntakeRecord"
    post:
      operationId: createIntake
      tags: [intakes]
      summary: Submit member intake data
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateIntakeBody"
      responses:
        "201":
          description: Intake saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntakeRecord"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /plans/generate:
    post:
      operationId: generatePlan
      tags: [plans]
      summary: Generate and persist a wellness plan from an intake
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GeneratePlanBody"
      responses:
        "201":
          description: Plan generated and saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlanWithItems"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /plans/{id}:
    get:
      operationId: getPlan
      tags: [plans]
      summary: Get a saved plan with its items
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Plan with items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlanWithItems"
        "404":
          description: Plan not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updatePlan
      tags: [plans]
      summary: Update plan status (save/activate)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePlanBody"
      responses:
        "200":
          description: Updated plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlanRecord"
        "404":
          description: Plan not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /providers:
    get:
      operationId: listProviders
      tags: [providers]
      summary: List approved providers with optional filters
      parameters:
        - name: modalityId
          in: query
          schema:
            type: string
        - name: zipCode
          in: query
          schema:
            type: string
        - name: radius
          in: query
          schema:
            type: number
        - name: telehealth
          in: query
          schema:
            type: boolean
        - name: limit
          in: query
          schema:
            type: number
        - name: offset
          in: query
          schema:
            type: number
      responses:
        "200":
          description: List of providers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProviderRecord"
    post:
      operationId: createProvider
      tags: [providers]
      summary: Create a provider profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProviderBody"
      responses:
        "201":
          description: Provider created (pending approval)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderRecord"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /favorites:
    get:
      operationId: listFavorites
      tags: [favorites]
      summary: List member's favorited providers
      parameters:
        - name: profileId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of favorites
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FavoriteRecord"
    post:
      operationId: addFavorite
      tags: [favorites]
      summary: Add a provider to favorites
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddFavoriteBody"
      responses:
        "201":
          description: Added to favorites
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FavoriteRecord"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /favorites/{providerId}:
    delete:
      operationId: removeFavorite
      tags: [favorites]
      summary: Remove a provider from favorites
      parameters:
        - name: providerId
          in: path
          required: true
          schema:
            type: string
        - name: profileId
          in: query
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Removed
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /progress:
    get:
      operationId: listProgress
      tags: [progress]
      summary: List member's progress logs
      parameters:
        - name: profileId
          in: query
          required: true
          schema:
            type: string
        - name: planId
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: number
      responses:
        "200":
          description: Progress logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProgressLogRecord"
    post:
      operationId: createProgressLog
      tags: [progress]
      summary: Log a wellness session or check-in
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProgressLogBody"
      responses:
        "201":
          description: Progress logged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProgressLogRecord"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Get aggregate platform stats
      responses:
        "200":
          description: Admin statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  /admin/modalities/{id}:
    get:
      operationId: getAdminModality
      tags: [admin]
      summary: Get a single modality (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Modality detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModalityRecord"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateAdminModality
      tags: [admin]
      summary: Update modality (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateModalityBody"
      responses:
        "200":
          description: Updated modality
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModalityRecord"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/providers/{id}:
    get:
      operationId: getAdminProvider
      tags: [admin]
      summary: Get a single provider (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Provider detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderRecord"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateAdminProvider
      tags: [admin]
      summary: Approve or reject a provider (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProviderStatusBody"
      responses:
        "200":
          description: Updated provider
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderRecord"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/settings:
    get:
      operationId: listAdminSettings
      tags: [admin]
      summary: List all admin settings
      responses:
        "200":
          description: Admin settings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminSettingRecord"
    patch:
      operationId: upsertAdminSetting
      tags: [admin]
      summary: Create or update an admin setting
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertAdminSettingBody"
      responses:
        "200":
          description: Updated setting
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminSettingRecord"

  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      responses:
        '200':
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'

  /login:
    get:
      tags: [Auth]
      operationId: beginBrowserLogin
      summary: Start the browser OIDC login flow
      parameters:
        - name: returnTo
          in: query
          required: false
          schema:
            type: string
      responses:
        '302':
          description: Redirect to the OIDC authorization endpoint.

  /callback:
    get:
      tags: [Auth]
      operationId: handleBrowserLoginCallback
      summary: Complete the browser OIDC login flow
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
      responses:
        '302':
          description: Redirect to returnTo on success or /api/login on failure.

  /logout:
    get:
      tags: [Auth]
      operationId: logoutBrowserSession
      summary: Clear the session and begin OIDC logout
      responses:
        '302':
          description: Redirect to the OIDC provider logout URL.

  /mobile-auth/token-exchange:
    post:
      tags: [Auth]
      operationId: exchangeMobileAuthorizationCode
      summary: Exchange a mobile OIDC code for a session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobileTokenExchangeRequest'
      responses:
        '200':
          description: Session created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileTokenExchangeSuccess'

  /mobile-auth/logout:
    post:
      tags: [Auth]
      operationId: logoutMobileSession
      summary: Delete a mobile session token
      responses:
        '200':
          description: Logout processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthLogoutSuccess'

  # ─── Employer Stipend Endpoints ───────────────────────────────────────────

  /employer/signup:
    post:
      tags: [employer]
      operationId: createEmployer
      summary: Register a new employer wellness stipend account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEmployerBody'
      responses:
        '201':
          description: Employer account created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Employer'
        '409':
          description: Employer account already exists.

  /employer/me:
    get:
      tags: [employer]
      operationId: getEmployerAccount
      summary: Get the authenticated employer's account details
      responses:
        '200':
          description: Employer account data.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployerAccount'
        '404':
          description: No employer account found.
    patch:
      tags: [employer]
      operationId: updateEmployerAccount
      summary: Update employer account settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateEmployerBody'
      responses:
        '200':
          description: Updated employer account.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Employer'
        '404':
          description: No employer account found.

  /employer/members:
    get:
      tags: [employer]
      operationId: getEmployerMemberCohort
      summary: Get aggregate-only cohort utilization statistics for enrolled employees
      description: >
        Returns anonymized aggregate statistics only — no individual member rows
        or identifiers are exposed to the employer.
      responses:
        '200':
          description: Cohort statistics.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployerCohortStats'
        '404':
          description: No employer account found.

  /employer/redeem-code:
    post:
      tags: [employer]
      operationId: redeemEmployerInviteCode
      summary: Enroll the authenticated member into an employer wellness programme
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RedeemCodeBody'
      responses:
        '200':
          description: Enrolment successful.
        '404':
          description: Invalid or expired invite code.
        '409':
          description: Member already enrolled with this or another employer.

  /employer/enroll-status:
    get:
      tags: [employer]
      operationId: getEmployerEnrollStatus
      summary: Check whether the current member is enrolled with an employer
      responses:
        '200':
          description: Enrolment status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnrollStatusResponse'

  /employer/modality-rules:
    get:
      tags: [employer]
      operationId: listEmployerModalityRules
      summary: List modality coverage rules for the employer's programme
      responses:
        '200':
          description: List of modality coverage rules.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ModalityRule'
        '404':
          description: No employer account found.
    post:
      tags: [employer]
      operationId: upsertEmployerModalityRule
      summary: Create or update a modality coverage rule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertModalityRuleBody'
      responses:
        '200':
          description: Rule saved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModalityRule'
        '404':
          description: No employer account found.

  /employer/export-csv:
    get:
      tags: [employer]
      operationId: exportEmployerCsv
      summary: Download aggregate utilization summary as CSV
      description: >
        Returns an aggregate cohort CSV (utilization brackets × member counts).
        No individual rows or identifiers are included.
      responses:
        '200':
          description: CSV file attachment.
          content:
            text/csv:
              schema:
                type: string

  /employer/billing/create-checkout:
    post:
      tags: [employer]
      operationId: createEmployerBillingCheckout
      summary: Create a Stripe Checkout session for employer monthly billing
      description: >
        Billing is calculated on contracted headcount (numberOfEmployees × stipendPerEmployee × fee multiplier).
        Returns a demo invoice preview when STRIPE_SECRET_KEY is not configured.
      responses:
        '200':
          description: Checkout session URL or demo invoice preview.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BillingCheckoutResponse'
        '404':
          description: No employer account found.

  /employer/billing/webhook:
    post:
      tags: [employer]
      operationId: stripeWebhook
      summary: Stripe webhook receiver for subscription lifecycle events
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Raw Stripe webhook event payload.
      responses:
        '200':
          description: Webhook processed.
        '400':
          description: Invalid webhook signature.

  # ─── Admin Employer Management Endpoints ──────────────────────────────────

  /admin/employers:
    get:
      tags: [employer-admin]
      operationId: adminListEmployers
      summary: List all employer accounts (admin only)
      responses:
        '200':
          description: List of employers.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AdminEmployer'

  /admin/employers/{id}:
    get:
      tags: [employer-admin]
      operationId: adminGetEmployer
      summary: Get a specific employer account (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Employer details with members count.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminEmployerDetail'
        '404':
          description: Employer not found.
    patch:
      tags: [employer-admin]
      operationId: adminUpdateEmployer
      summary: Update an employer account (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminUpdateEmployerBody'
      responses:
        '200':
          description: Updated employer.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Employer'
        '404':
          description: Employer not found.

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        details:
          type: object
          additionalProperties: true
      required:
        - error

    ModalityRecord:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        emoji:
          type: string
        category:
          type: string
        evidenceLevel:
          type: string
        costLow:
          type: integer
        costHigh:
          type: integer
        typicalFrequency:
          type: string
        hsaEligible:
          type: boolean
        description:
          type: string
        goals:
          type: array
          items:
            type: string
        conditions:
          type: array
          items:
            type: string
        preferenceMatch:
          type: array
          items:
            type: string
        exclusionIds:
          type: array
          items:
            type: string
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - emoji
        - category
        - evidenceLevel
        - costLow
        - costHigh
        - typicalFrequency
        - hsaEligible
        - description
        - goals
        - conditions
        - preferenceMatch
        - exclusionIds
        - isActive
        - createdAt
        - updatedAt

    CreateModalityBody:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        emoji:
          type: string
        category:
          type: string
        evidenceLevel:
          type: string
        costLow:
          type: integer
        costHigh:
          type: integer
        typicalFrequency:
          type: string
        hsaEligible:
          type: boolean
        description:
          type: string
        goals:
          type: array
          items:
            type: string
        conditions:
          type: array
          items:
            type: string
        preferenceMatch:
          type: array
          items:
            type: string
        exclusionIds:
          type: array
          items:
            type: string
      required:
        - id
        - name
        - category
        - evidenceLevel
        - costLow
        - costHigh
        - typicalFrequency
        - description

    UpdateModalityBody:
      type: object
      properties:
        name:
          type: string
        emoji:
          type: string
        isActive:
          type: boolean
        costLow:
          type: integer
        costHigh:
          type: integer
        description:
          type: string

    IntakeRecord:
      type: object
      properties:
        id:
          type: string
        profileId:
          type: string
          nullable: true
        budget:
          type: integer
        goals:
          type: array
          items:
            type: string
        conditions:
          type: array
          items:
            type: string
        preferences:
          type: array
          items:
            type: string
        exclusions:
          type: array
          items:
            type: string
        zipCode:
          type: string
          nullable: true
        radius:
          type: integer
        telehealth:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - budget
        - goals
        - conditions
        - preferences
        - exclusions
        - radius
        - telehealth
        - createdAt

    CreateIntakeBody:
      type: object
      properties:
        profileId:
          type: string
        budget:
          type: integer
        goals:
          type: array
          items:
            type: string
        conditions:
          type: array
          items:
            type: string
        preferences:
          type: array
          items:
            type: string
        exclusions:
          type: array
          items:
            type: string
        zipCode:
          type: string
        radius:
          type: integer
        telehealth:
          type: boolean
      required:
        - budget
        - goals
        - conditions
        - preferences
        - exclusions
        - telehealth

    GeneratePlanBody:
      type: object
      properties:
        intakeId:
          type: string
        profileId:
          type: string
        budget:
          type: integer
        goals:
          type: array
          items:
            type: string
        conditions:
          type: array
