    # ─── Employer Schemas ─────────────────────────────────────────────────────

    CreateEmployerBody:
      type: object
      required: [companyName, adminContactName, adminContactEmail, numberOfEmployees, stipendPerEmployee]
      properties:
        companyName:
          type: string
          minLength: 1
        adminContactName:
          type: string
          minLength: 2
          description: Full name of the primary admin contact
        adminContactEmail:
          type: string
          format: email
          description: Email address of the primary admin contact
        numberOfEmployees:
          type: integer
          minimum: 1
        stipendPerEmployee:
          type: integer
          description: Monthly stipend per employee in cents
          minimum: 0
        platformFeePercent:
          type: number
          description: Platform fee percentage (default 8)
        coveredModalities:
          type: array
          items:
            type: string
          description: List of modality IDs covered by this employer

    UpdateEmployerBody:
      type: object
      properties:
        companyName:
          type: string
          minLength: 1
        numberOfEmployees:
          type: integer
          minimum: 1
        stipendPerEmployee:
          type: integer
          minimum: 0
        platformFeePercent:
          type: number
        status:
          type: string
          enum: [pending, active, canceled]

    Employer:
      type: object
      required: [id, companyName, status, inviteCode]
      properties:
        id:
          type: string
        companyName:
          type: string
        status:
          type: string
          enum: [pending, active, canceled]
        inviteCode:
          type: string
        numberOfEmployees:
          type: integer
        stipendPerEmployee:
          type: integer
          description: Monthly stipend per employee in cents
        platformFeePercent:
          type: number
        createdAt:
          type: string
          format: date-time

    EmployerAccount:
      allOf:
        - $ref: '#/components/schemas/Employer'
        - type: object
          properties:
            enrolledCount:
              type: integer
            totalAllocatedCents:
              type: integer
            totalSpentCents:
              type: integer
            stripeCustomerId:
              type: string
              nullable: true
            stripeSubscriptionId:
              type: string
              nullable: true

    EmployerCohortStats:
      type: object
      required: [contractedHeadcount, totalEnrolled, utilizationRate, utilizationBuckets, enrollmentTrend]
      description: >
        Aggregate-only cohort statistics. No individual member identifiers or
        personal data are included.
      properties:
        contractedHeadcount:
          type: integer
          description: Contracted total employee headcount
        totalEnrolled:
          type: integer
          description: Number of employees who have redeemed an invite code
        utilizationRate:
          type: integer
          description: Cohort-wide average utilization percentage
        averageMonthlyBudgetCents:
          type: integer
        averageMonthlySpentCents:
          type: integer
        utilizationBuckets:
          type: array
          items:
            type: object
            required: [label, count, pct, barMin]
            properties:
              label:
                type: string
                example: "25–50%"
              count:
                type: integer
              pct:
                type: integer
                description: Percentage of enrolled cohort in this bucket
              barMin:
                type: integer
        enrollmentTrend:
          type: array
          items:
            type: object
            required: [month, count]
            properties:
              month:
                type: string
                description: "YYYY-MM"
              count:
                type: integer

    RedeemCodeBody:
      type: object
      required: [inviteCode]
      properties:
        inviteCode:
          type: string
          minLength: 1

    EnrollStatusResponse:
      type: object
      required: [enrolled]
      properties:
        enrolled:
          type: boolean
        employer:
          type: object
          nullable: true
          properties:
            id:
              type: string
            companyName:
              type: string
            inviteCode:
              type: string
            status:
              type: string
        member:
          type: object
          nullable: true
          properties:
            monthlyBudget:
              type: integer
            spentThisMonth:
              type: integer
              description: Effective spend for current month (0 if prior-month data)
            budgetMonth:
              type: string
            remainingCents:
              type: integer

    ModalityRule:
      type: object
      required: [id, employerId, modalityId, covered]
      properties:
        id:
          type: string
        employerId:
          type: string
        modalityId:
          type: string
        covered:
          type: boolean
        maxMonthlyAllocationCents:
          type: integer
          nullable: true

    SetModalityRulesBody:
      type: object
      required: [rules]
      properties:
        rules:
          type: array
          items:
            type: object
            required: [modalityId, covered]
            properties:
              modalityId:
                type: string
              covered:
                type: boolean

    BillingCheckoutResponse:
      type: object
      properties:
        url:
          type: string
          description: Stripe Checkout session URL (live mode only)
        stripe_mode:
          type: string
          enum: [live, demo]
        message:
          type: string
        invoice_preview:
          type: object
          description: Demo mode invoice preview (no Stripe key configured)
          properties:
            companyName:
              type: string
            contractedHeadcount:
              type: integer
            enrolledMembers:
              type: integer
            stipendPerEmployee:
              type: string
            platformFee:
              type: string
            totalMonthly:
              type: string
            billingCycle:
              type: string
            formula:
              type: string

    AdminEmployer:
      type: object
      required: [id, companyName, status, inviteCode, numberOfEmployees]
      properties:
        id:
          type: string
        companyName:
          type: string
        status:
          type: string
          enum: [pending, active, canceled]
        inviteCode:
          type: string
        numberOfEmployees:
          type: integer
        stipendPerEmployee:
          type: integer
        platformFeePercent:
          type: number
        enrolledCount:
          type: integer
        createdAt:
          type: string
          format: date-time

    AdminEmployerDetail:
      type: object
      required: [employer, members, rules]
      description: >
        Admin-only view of an employer account including raw member and rule records.
        This shape is never exposed to employer users.
      properties:
        employer:
          $ref: '#/components/schemas/AdminEmployer'
        members:
          type: array
          description: Raw employer_members rows (admin-only)
          items:
            type: object
        rules:
          type: array
          items:
            $ref: '#/components/schemas/ModalityRule'

    AdminUpdateEmployerBody:
      type: object
      properties:
        status:
          type: string
          enum: [pending, active, canceled]
        numberOfEmployees:
          type: integer
          minimum: 1
        stipendPerEmployee:
          type: integer
          minimum: 0
        platformFeePercent:
          type: number

    ReferralRow:
      type: object
      properties:
        id:
          type: string
        status:
          type: string
          enum: [pending, rewarded]
        code:
          type: string
        createdAt:
          type: string
          format: date-time
        rewardedAt:
          type: string
          format: date-time
          nullable: true
        referredMemberName:
          type: string
          nullable: true
        referredMemberEmail:
          type: string
          nullable: true
      required: [id, status, code, createdAt]

    MemberCreditRow:
      type: object
      properties:
        id:
          type: string
        profileId:
          type: string
        source:
          type: string
          enum: [referral, promo]
        amountCents:
          type: integer
        used:
          type: boolean
        referralId:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        usedAt:
          type: string
          format: date-time
          nullable: true
      required: [id, profileId, source, amountCents, used, createdAt]

    ReferralsMineResponse:
      type: object
      properties:
        referralCode:
          type: string
        referralHistory:
          type: array
          items:
            $ref: '#/components/schemas/ReferralRow'
        creditSummary:
          type: object
          properties:
            totalCredits:
              type: integer
            unusedCreditsCents:
              type: integer
            unusedCreditsFormatted:
              type: string
            credits:
              type: array
              items:
                $ref: '#/components/schemas/MemberCreditRow'
          required: [totalCredits, unusedCreditsCents, unusedCreditsFormatted, credits]
      required: [referralCode, referralHistory, creditSummary]

    RegisterReferralBody:
      type: object
      properties:
        referralCode:
          type: string
      required: [referralCode]

    CreditsMineResponse:
      type: object
      properties:
        unusedCreditsCents:
          type: integer
        unusedCreditsFormatted:
          type: string
        hasCredits:
          type: boolean
        credits:
          type: array
          items:
            $ref: '#/components/schemas/MemberCreditRow'
      required: [unusedCreditsCents, unusedCreditsFormatted, hasCredits, credits]

    # ─── Messaging Schemas ─────────────────────────────────────────────────────

    GenerateMagicLinkBody:
      type: object
      required: [action]
      properties:
        action:
          type: string
          enum: [login, payment, appointment, accountability]
        payload:
          type: object
          additionalProperties: true
        sendEmail:
          type: boolean
          default: false

    GenerateMagicLinkResponse:
      type: object
      required: [token, url, expiresAt]
      properties:
        token:
          type: string
          format: uuid
        url:
          type: string
        expiresAt:
          type: string
          format: date-time

    CommsPrefsResponse:
      type: object
      required: [prefs]
      properties:
        prefs:
          type: object
          required: [email, sms]
          properties:
            email:
              type: boolean
            sms:
              type: boolean
        phone:
          type: string
          nullable: true

    UpdateCommsPrefsBody:
      type: object
      properties:
        email:
          type: boolean
        sms:
          type: boolean
        phone:
          type: string
          nullable: true

    NotificationType:
      type: string
      enum:
        - welcome
        - plan-ready
        - session-reminder
        - session-confirmed
        - payment-due
        - payment-confirmed
        - accountability-nudge
        - referral-invite
        - referral-reward
        - magic-link
        - weekly-summary
        - streak-at-risk

    NotificationLogEntry:
      type: object
      required: [id, profileId, channel, type, status, createdAt]
      properties:
        id:
          type: string
        profileId:
          type: string
        channel:
          type: string
          enum: [email, sms]
        type:
          $ref: '#/components/schemas/NotificationType'
        status:
          type: string
          enum: [queued, sent, failed]
        scheduledFor:
          type: string
          format: date-time
          nullable: true
        sentAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        email:
          type: string
          nullable: true
        displayName:
          type: string
          nullable: true

    NotificationLogResponse:
      type: object
      required: [entries, total, page, limit]
      properties:
        entries:
          type: array
          items:
            $ref: '#/components/schemas/NotificationLogEntry'
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
