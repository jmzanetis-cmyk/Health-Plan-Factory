openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Health Plan Factory API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: modalities
    description: Wellness modality catalog
  - name: intakes
    description: Member intake submissions
  - name: plans
    description: Generated wellness plans
  - name: providers
    description: Wellness provider directory
  - name: favorites
    description: Member saved providers
  - name: progress
    description: Member progress logs
  - name: admin
    description: Admin operations
  - name: employer
    description: Employer wellness stipend account operations
  - name: employer-admin
    description: Admin management of employer accounts
  - name: Auth
    description: Browser and mobile authentication endpoints.
  - name: lmn
    description: Letter of Medical Necessity (LMN) and HSA unlock flow
  - name: referrals
    description: Member referral program — share links, earn credits
  - name: messaging
    description: Transactional email, SMS, magic links, and communication preferences

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /modalities:
    get:
      operationId: listModalities
      tags: [modalities]
      summary: List all active wellness modalities
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: isActive
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: List of modalities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ModalityRecord"
    post:
      operationId: createModality
      tags: [modalities]
      summary: Create a new modality (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateModalityBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModalityRecord"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /insights/mine:
    get:
      operationId: getMyInsights
      tags: [insights]
      summary: Get cached longitudinal outcome insights for the current member
      description: >
        Returns pre-computed outcome correlations derived from journal entries and
        session history. Auto-refreshes if the cache is stale (> 24 hours).
        Requires at least 14 journal entries to surface correlations; returns empty
        arrays with journalCount < 14 otherwise.
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Insights response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InsightsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /insights/refresh:
    post:
      operationId: refreshMyInsights
      tags: [insights]
      summary: Force-refresh the member's insights cache
      description: >
        Triggers a synchronous recomputation of outcome correlations from all
        journal and session data, replacing any cached result.
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Fresh insights response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InsightsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /modalities/{id}:
    get:
      operationId: getModalityById
      tags: [modalities]
      summary: Get a modality by ID (slug)
      description: >
        Returns full modality detail including evidence summary, meta description,
        and related modality IDs. Used by the public /modalities/:slug evidence library page.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Modality detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModalityRecord"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /modalities/{id}/sessions:
    post:
      operationId: recordModalitySession
      tags: [modalities]
      summary: Record a modality session with employer stipend deduction
      description: >
        Dedicated spend-trigger endpoint for modality sessions. Employer stipend
        deduction and progress log creation run in a single transaction.
        employerCoveredCents reflects how much the employer covered (up to the
        member's remaining monthly balance); outOfPocketCents is the remainder.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sessionCostCents]
              properties:
                profileId:
                  type: string
                  format: uuid
                  description: Optional. Admin callers may specify a target profileId; non-admin callers always use their own profile.
                sessionCostCents:
                  type: integer
                  minimum: 1
                  description: Actual session cost in cents (must be > 0)
                note:
                  type: string
                sessionDate:
                  type: string
                  format: date-time
      responses:
        "201":
          description: Session recorded; stipend deduction applied if applicable.
          content:
            application/json:
              schema:
                type: object
                required: [id, modalityId, sessionCostCents]
                properties:
                  id:
                    type: string
                  modalityId:
                    type: string
                  sessionCostCents:
                    type: integer
                  employerCoveredCents:
                    type: integer
                    nullable: true
                  outOfPocketCents:
                    type: integer
                    nullable: true
                  createdAt:
                    type: string
                    format: date-time
        "400":
          description: Validation error
        "401":
          description: Authentication required

  /intakes:
    get:
      operationId: listIntakes
      tags: [intakes]
      summary: List member intakes (own or admin)
      parameters:
        - name: profileId
          in: query
          required: false
          schema:
            type: string
          description: Filter intakes by member profile ID
      responses:
        "200":
          description: List of intakes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/IntakeRecord"
    post:
      operationId: createIntake
      tags: [intakes]
      summary: Submit member intake data
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateIntakeBody"
      responses:
        "201":
          description: Intake saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntakeRecord"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /plans/generate:
    post:
      operationId: generatePlan
      tags: [plans]
      summary: Generate and persist a wellness plan from an intake
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GeneratePlanBody"
      responses:
        "201":
          description: Plan generated and saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlanWithItems"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /plans/{id}:
    get:
      operationId: getPlan
      tags: [plans]
      summary: Get a saved plan with its items
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Plan with items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlanWithItems"
        "404":
          description: Plan not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updatePlan
      tags: [plans]
      summary: Update plan status (save/activate)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePlanBody"
      responses:
        "200":
          description: Updated plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlanRecord"
        "404":
          description: Plan not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /providers:
    get:
      operationId: listProviders
      tags: [providers]
      summary: List approved providers with optional filters
      parameters:
        - name: modalityId
          in: query
          schema:
            type: string
        - name: zipCode
          in: query
          schema:
            type: string
        - name: radius
          in: query
          schema:
            type: number
        - name: telehealth
          in: query
          schema:
            type: boolean
        - name: limit
          in: query
          schema:
            type: number
        - name: offset
          in: query
          schema:
            type: number
      responses:
        "200":
          description: List of providers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProviderRecord"
    post:
      operationId: createProvider
      tags: [providers]
      summary: Create a provider profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProviderBody"
      responses:
        "201":
          description: Provider created (pending approval)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderRecord"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /favorites:
    get:
      operationId: listFavorites
      tags: [favorites]
      summary: List member's favorited providers
      parameters:
        - name: profileId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of favorites
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FavoriteRecord"
    post:
      operationId: addFavorite
      tags: [favorites]
      summary: Add a provider to favorites
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddFavoriteBody"
      responses:
        "201":
          description: Added to favorites
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FavoriteRecord"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /favorites/{providerId}:
    delete:
      operationId: removeFavorite
      tags: [favorites]
      summary: Remove a provider from favorites
      parameters:
        - name: providerId
          in: path
          required: true
          schema:
            type: string
        - name: profileId
          in: query
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Removed
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /progress:
    get:
      operationId: listProgress
      tags: [progress]
      summary: List member's progress logs
      parameters:
        - name: profileId
          in: query
          required: true
          schema:
            type: string
        - name: planId
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: number
      responses:
        "200":
          description: Progress logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProgressLogRecord"
    post:
      operationId: createProgressLog
      tags: [progress]
      summary: Log a wellness session or check-in
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProgressLogBody"
      responses:
        "201":
          description: Progress logged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProgressLogRecord"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Get aggregate platform stats
      responses:
        "200":
          description: Admin statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  /admin/modalities/{id}:
    get:
      operationId: getAdminModality
      tags: [admin]
      summary: Get a single modality (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Modality detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModalityRecord"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateAdminModality
      tags: [admin]
      summary: Update modality (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateModalityBody"
      responses:
        "200":
          description: Updated modality
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModalityRecord"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/providers/{id}:
    get:
      operationId: getAdminProvider
      tags: [admin]
      summary: Get a single provider (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Provider detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderRecord"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateAdminProvider
      tags: [admin]
      summary: Approve or reject a provider (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProviderStatusBody"
      responses:
        "200":
          description: Updated provider
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderRecord"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/settings:
    get:
      operationId: listAdminSettings
      tags: [admin]
      summary: List all admin settings
      responses:
        "200":
          description: Admin settings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminSettingRecord"
    patch:
      operationId: upsertAdminSetting
      tags: [admin]
      summary: Create or update an admin setting
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertAdminSettingBody"
      responses:
        "200":
          description: Updated setting
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminSettingRecord"

  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      responses:
        '200':
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'

  /login:
    get:
      tags: [Auth]
      operationId: beginBrowserLogin
      summary: Start the browser OIDC login flow
      parameters:
        - name: returnTo
          in: query
          required: false
          schema:
            type: string
      responses:
        '302':
          description: Redirect to the OIDC authorization endpoint.

  /callback:
    get:
      tags: [Auth]
      operationId: handleBrowserLoginCallback
      summary: Complete the browser OIDC login flow
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
      responses:
        '302':
          description: Redirect to returnTo on success or /api/login on failure.

  /logout:
    get:
      tags: [Auth]
      operationId: logoutBrowserSession
      summary: Clear the session and begin OIDC logout
      responses:
        '302':
          description: Redirect to the OIDC provider logout URL.

  /mobile-auth/token-exchange:
    post:
      tags: [Auth]
      operationId: exchangeMobileAuthorizationCode
      summary: Exchange a mobile OIDC code for a session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobileTokenExchangeRequest'
      responses:
        '200':
          description: Session created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileTokenExchangeSuccess'

  /mobile-auth/logout:
    post:
      tags: [Auth]
      operationId: logoutMobileSession
      summary: Delete a mobile session token
      responses:
        '200':
          description: Logout processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthLogoutSuccess'

  # ─── LMN (Letter of Medical Necessity) Endpoints ─────────────────────────

  /lmn/status:
    get:
      operationId: getLmnStatus
      tags: [lmn]
      summary: Get member LMN status and HSA savings opportunity
      description: >
        Returns the authenticated member's LMN status, LMN-eligible modalities from their
        most recent plan, estimated annual HSA/FSA savings, and the latest LMN request if any.
      security:
        - session: []
      responses:
        "200":
          description: LMN status details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LmnStatusResponse'
        "401":
          $ref: '#/components/responses/Unauthorized'

  /lmn/request:
    post:
      operationId: createLmnRequest
      tags: [lmn]
      summary: Create or refresh a draft LMN request
      description: >
        Creates a personalized draft Letter of Medical Necessity request for the
        authenticated member, populated with their plan's LMN-eligible modalities.
        Also updates member's lmnStatus to "requested" if currently "none".
        Called manually from the HSA unlock flow or automatically after booking
        an LMN-eligible (DPC/medical) session.
      security:
        - session: []
      responses:
        "201":
          description: LMN draft created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LmnRequestResponse'
        "401":
          $ref: '#/components/responses/Unauthorized'

  /lmn/mark-received:
    post:
      operationId: markLmnReceived
      tags: [lmn]
      summary: Member self-reports their physician delivered the LMN
      description: >
        Updates the member's lmnStatus to "received" and marks the latest
        LMN request as received. This activates "LMN on file" badges on
        eligible progress log entries.
      security:
        - session: []
      responses:
        "200":
          description: LMN marked as received
          content:
            application/json:
              schema:
                type: object
                required: [lmnStatus]
                properties:
                  lmnStatus:
                    type: string
                    enum: [received]
        "401":
          $ref: '#/components/responses/Unauthorized'

  /lmn/eligible-modalities:
    get:
      operationId: listLmnEligibleModalities
      tags: [lmn]
      summary: List all LMN-eligible modalities
      description: >
        Public endpoint. Returns all active modalities flagged as LMN-eligible
        by an admin. Used by the plan page to show personalized physician callouts.
      responses:
        "200":
          description: List of LMN-eligible modalities
          content:
            application/json:
              schema:
                type: object
                required: [modalities]
                properties:
                  modalities:
                    type: array
                    items:
                      $ref: '#/components/schemas/LmnEligibleModality'

  # ─── Employer Stipend Endpoints ───────────────────────────────────────────

  /employer/signup:
    post:
      tags: [employer]
      operationId: createEmployer
      summary: Register a new employer wellness stipend account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEmployerBody'
      responses:
        '201':
          description: Employer account created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Employer'
        '409':
          description: Employer account already exists.

  /employer/me:
    get:
      tags: [employer]
      operationId: getEmployerAccount
      summary: Get the authenticated employer's account details
      responses:
        '200':
          description: Employer account data.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployerAccount'
        '404':
          description: No employer account found.
    patch:
      tags: [employer]
      operationId: updateEmployerAccount
      summary: Update employer account settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateEmployerBody'
      responses:
        '200':
          description: Updated employer account.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Employer'
        '404':
          description: No employer account found.

  /employer/dashboard:
    get:
      tags: [employer]
      operationId: getEmployerDashboard
      summary: Get employer dashboard stats including spend, utilization, and top modalities
      description: >
        Returns aggregate employer wellness programme statistics. Utilization
        and spend metrics are suppressed (null) when fewer than 5 members are
        enrolled to protect individual privacy (k-anonymity floor).
      responses:
        '200':
          description: Employer dashboard data.
          content:
            application/json:
              schema:
                type: object
                required: [employer, stats, topModalities, monthlySpend]
                properties:
                  employer:
                    $ref: '#/components/schemas/Employer'
                  stats:
                    type: object
                    required: [totalEnrolled, totalBudgetCents, monthlyInvoiceCents]
                    properties:
                      totalEnrolled:
                        type: integer
                      totalBudgetCents:
                        type: integer
                      totalSpentCents:
                        type: integer
                        nullable: true
                        description: Suppressed (null) when cohort < 5 members
                      utilizationPct:
                        type: integer
                        nullable: true
                        description: Suppressed (null) when cohort < 5 members
                      avgWellnessScore:
                        type: integer
                        nullable: true
                        description: Suppressed (null) when cohort < 5 members
                      monthlyInvoiceCents:
                        type: number
                      privacySuppressed:
                        type: boolean
                  topModalities:
                    type: array
                    items:
                      type: object
                      required: [modalityId, sessionCount]
                      properties:
                        modalityId:
                          type: string
                        sessionCount:
                          type: integer
                  monthlySpend:
                    type: array
                    description: 6-month historical spend derived from actual employer-covered session costs
                    items:
                      type: object
                      required: [month, totalCents]
                      properties:
                        month:
                          type: string
                          description: "YYYY-MM"
                        totalCents:
                          type: integer
        '404':
          description: No employer account found.

  /employer/my-budget:
    get:
      tags: [employer]
      operationId: getMyEmployerBudget
      summary: Get the current member's employer stipend budget and spend status
      description: >
        Returns the authenticated member's employer enrollment and remaining
        monthly stipend balance. Only accessible by enrolled members.
      responses:
        '200':
          description: Member budget and enrollment details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnrollStatusResponse'
        '404':
          description: Member is not enrolled with any employer.

  /employer/members:
    get:
      tags: [employer]
      operationId: getEmployerMemberCohort
      summary: Get aggregate-only cohort utilization statistics for enrolled employees
      description: >
        Returns anonymized aggregate statistics only — no individual member rows
        or identifiers are exposed to the employer.
      responses:
        '200':
          description: Cohort statistics.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployerCohortStats'
        '404':
          description: No employer account found.

  /employer/redeem-code:
    post:
      tags: [employer]
      operationId: redeemEmployerInviteCode
      summary: Enroll the authenticated member into an employer wellness programme
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RedeemCodeBody'
      responses:
        '201':
          description: Enrolment successful — member linked to employer stipend account.
          content:
            application/json:
              schema:
                type: object
                required: [success, companyName, monthlyBudget]
                properties:
                  success:
                    type: boolean
                  companyName:
                    type: string
                  monthlyBudget:
                    type: integer
                    description: Monthly stipend in cents
        '404':
          description: Invalid or expired invite code.
        '409':
          description: Member already enrolled with this or another employer.

  /employer/enroll-status:
    get:
      tags: [employer]
      operationId: getEmployerEnrollStatus
      summary: Check whether the current member is enrolled with an employer
      responses:
        '200':
          description: Enrolment status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnrollStatusResponse'

  /employer/modality-rules:
    get:
      tags: [employer]
      operationId: listEmployerModalityRules
      summary: List modality coverage rules for the employer's programme
      responses:
        '200':
          description: List of modality coverage rules.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ModalityRule'
        '404':
          description: No employer account found.
    put:
      tags: [employer]
      operationId: setEmployerModalityRules
      summary: Bulk set modality coverage rules for the employer's programme
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetModalityRulesBody'
      responses:
        '200':
          description: All rules saved; returns full updated rule list.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ModalityRule'
        '404':
          description: No employer account found.

  /employer/export-csv:
    get:
      tags: [employer]
      operationId: exportEmployerCsv
      summary: Download aggregate utilization summary as CSV
      description: >
        Returns an aggregate cohort CSV (utilization brackets × member counts).
        No individual rows or identifiers are included.
      responses:
        '200':
          description: CSV file attachment.
          content:
            text/csv:
              schema:
                type: string

  /employer/billing/create-checkout:
    post:
      tags: [employer]
      operationId: createEmployerBillingCheckout
      summary: Create a Stripe Checkout session for employer monthly billing
      description: >
        Billing is calculated on contracted headcount (numberOfEmployees × stipendPerEmployee × fee multiplier).
        Returns a demo invoice preview when STRIPE_SECRET_KEY is not configured.
      responses:
        '200':
          description: Checkout session URL or demo invoice preview.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BillingCheckoutResponse'
        '404':
          description: No employer account found.

  /employer/billing/webhook:
    post:
      tags: [employer]
      operationId: stripeWebhook
      summary: Stripe webhook receiver for subscription lifecycle events
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Raw Stripe webhook event payload.
      responses:
        '200':
          description: Webhook processed.
        '400':
          description: Invalid webhook signature.

  # ─── Admin Employer Management Endpoints ──────────────────────────────────

  /admin/employers:
    get:
      tags: [employer-admin]
      operationId: adminListEmployers
      summary: List all employer accounts (admin only)
      responses:
        '200':
          description: List of employers.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AdminEmployer'
    post:
      tags: [employer-admin]
      operationId: adminCreateEmployer
      summary: Create a new employer account (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEmployerBody'
      responses:
        '201':
          description: Created employer.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Employer'
        '400':
          description: Invalid request body.

  /admin/employers/{id}:
    get:
      tags: [employer-admin]
      operationId: adminGetEmployer
      summary: Get a specific employer account (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Employer details with members count.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminEmployerDetail'
        '404':
          description: Employer not found.
    patch:
      tags: [employer-admin]
      operationId: adminUpdateEmployer
      summary: Update an employer account (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminUpdateEmployerBody'
      responses:
        '200':
          description: Updated employer.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Employer'
        '404':
          description: Employer not found.
    delete:
      tags: [employer-admin]
      operationId: adminDeleteEmployer
      summary: Delete an employer account (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Employer deleted.
        '404':
          description: Employer not found.

  /referrals/mine:
    get:
      operationId: getReferralsMine
      tags: [referrals]
      summary: Get member's referral code, history, and credit summary
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Referral data for the authenticated member.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReferralsMineResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /referrals/register:
    post:
      operationId: postReferralRegister
      tags: [referrals]
      summary: Register a pending referral using a referral code
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterReferralBody'
      responses:
        '200':
          description: Referral registered (or already registered).
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  alreadyRegistered:
                    type: boolean
        '400':
          description: Invalid or self-referral code.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Referral code not found.

  /referrals/track:
    post:
      operationId: postReferralTrack
      tags: [referrals]
      summary: Trigger referral reward check for the authenticated member (e.g. after first plan is generated). Idempotent — safe to call multiple times.
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Referral reward check completed (reward issued if conditions were met).
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: ok
                required: [message]
        '401':
          $ref: '#/components/responses/Unauthorized'

  /referrals/new-credit-since/{timestamp}:
    get:
      operationId: getReferralNewCreditSince
      tags: [referrals]
      summary: Check if the member has received any new credits since a given timestamp (for polling notifications)
      security:
        - cookieAuth: []
      parameters:
        - name: timestamp
          in: path
          required: true
          description: ISO 8601 timestamp — return credits created after this moment
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: New credits (if any) since the provided timestamp.
          content:
            application/json:
              schema:
                type: object
                properties:
                  hasNew:
                    type: boolean
                  newCredits:
                    type: array
                    items:
                      $ref: '#/components/schemas/MemberCreditRow'
                  referrerName:
                    type: string
                    nullable: true
                    description: Display name of the referrer if a new credit was rewarded
                required: [hasNew, newCredits]
        '401':
          $ref: '#/components/responses/Unauthorized'

  /providers/unlock:
    post:
      operationId: postProviderUnlock
      tags: [providers]
      summary: Apply a referral credit to unlock a provider listing
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                providerId:
                  type: string
                modalityCategory:
                  type: string
                  enum: [telehealth, medical, wellness, fitness]
              required: [providerId]
      responses:
        '200':
          description: Unlock result — whether a credit was applied and the net charge.
          content:
            application/json:
              schema:
                type: object
                properties:
                  used_credit:
                    type: boolean
                  credit_applied_cents:
                    type: integer
                  amount_charged_cents:
                    type: integer
                  amount_charged_formatted:
                    type: string
                  providerId:
                    type: string
                  message:
                    type: string
                required: [used_credit, credit_applied_cents, amount_charged_cents, amount_charged_formatted, providerId, message]
        '400':
          description: Missing or invalid providerId.
        '401':
          $ref: '#/components/responses/Unauthorized'

  /admin/referral-stats:
    get:
      operationId: getAdminReferralStats
      tags: [admin]
      summary: Get referral program statistics (admin only)
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Aggregated referral program metrics.
          content:
            application/json:
              schema:
                type: object
                properties:
                  totalReferrals:
                    type: integer
                  rewardedReferrals:
                    type: integer
                  pendingReferrals:
                    type: integer
                  conversionRate:
                    type: integer
                    description: Percentage of referrals that resulted in a reward (0-100)
                  totalCreditsIssued:
                    type: integer
                  creditsUsed:
                    type: integer
                  totalCreditsCentsIssued:
                    type: integer
                  totalCreditsCentsUsed:
                    type: integer
                  totalCreditsIssuedFormatted:
                    type: string
                  totalCreditsUsedFormatted:
                    type: string
                required: [totalReferrals, rewardedReferrals, pendingReferrals, conversionRate, totalCreditsIssued, creditsUsed, totalCreditsCentsIssued, totalCreditsCentsUsed, totalCreditsIssuedFormatted, totalCreditsUsedFormatted]
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /credits/mine:
    get:
      operationId: getCreditsMine
      tags: [referrals]
      summary: Get member's unused credit balance and history
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Credit balance for the authenticated member.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreditsMineResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /magic-links/generate:
    post:
      operationId: generateMagicLink
      tags: [messaging]
      summary: Generate a signed magic link for passwordless actions
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateMagicLinkBody'
      responses:
        '201':
          description: Magic link generated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerateMagicLinkResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /magic-links/redeem/{token}:
    get:
      operationId: redeemMagicLink
      tags: [messaging]
      summary: Validate and redeem a magic link token
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '302':
          description: Token valid — redirects to the action destination (sets session cookie for login action)
        '410':
          description: Token is invalid, expired, or already used
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /profile/comms-prefs:
    get:
      operationId: getCommsPrefs
      tags: [messaging]
      summary: Get the authenticated member's communication preferences
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Current communication preferences
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommsPrefsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
    patch:
      operationId: updateCommsPrefs
      tags: [messaging]
      summary: Update the authenticated member's communication preferences
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCommsPrefsBody'
      responses:
        '200':
          description: Updated preferences
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommsPrefsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /admin/notification-log:
    get:
      operationId: listNotificationLog
      tags: [admin, messaging]
      summary: Paginated admin view of all outbound notifications
      security:
        - cookieAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: profileId
          in: query
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [queued, sent, failed]
        - name: channel
          in: query
          schema:
            type: string
            enum: [email, sms]
      responses:
        '200':
          description: Paginated notification log entries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationLogResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

components:
  responses:
    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    BadRequest:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    # ─── LMN Schemas ──────────────────────────────────────────────────────────
    LmnEligibleItem:
      type: object
      required: [modalityId, name, emoji, estimatedMonthlyCost]
      properties:
        modalityId:
          type: string
        name:
          type: string
        emoji:
          type: string
        estimatedMonthlyCost:
          type: integer
          description: Estimated monthly cost in cents

    LmnStatusResponse:
      type: object
      required: [lmnStatus, eligibleItems, estimatedAnnualSavings, hasActivePlan]
      properties:
        lmnStatus:
          type: string
          enum: [none, requested, received]
        eligibleItems:
          type: array
          items:
            $ref: '#/components/schemas/LmnEligibleItem'
        estimatedAnnualSavings:
          type: integer
          description: Estimated annual HSA/FSA savings in cents
        hasActivePlan:
          type: boolean
        latestRequest:
          $ref: '#/components/schemas/LmnRequest'
          nullable: true

    LmnRequest:
      type: object
      required: [id, profileId, status, draftMessage, createdAt, updatedAt]
      properties:
        id:
          type: string
        profileId:
          type: string
        planId:
          type: string
          nullable: true
        status:
          type: string
          enum: [draft, sent, received]
        draftMessage:
          type: string
        eligibleModalities:
          type: array
          items:
            type: string
        estimatedAnnualSavings:
          type: integer
          nullable: true
          description: Estimated annual savings in cents
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    LmnRequestResponse:
      type: object
      required: [request, lmnStatus]
      properties:
        request:
          $ref: '#/components/schemas/LmnRequest'
        lmnStatus:
          type: string

    LmnEligibleModality:
      type: object
      required: [id, name, emoji, category]
      properties:
        id:
          type: string
        name:
          type: string
        emoji:
          type: string
        category:
          type: string
        costLow:
          type: integer
          nullable: true
        costHigh:
          type: integer
          nullable: true
        description:
          type: string
          nullable: true

    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    InsightSparklinePoint:
      type: object
      properties:
        date:
          type: string
          format: date
        value:
          type: number
        hasSession:
          type: boolean
      required: [date, value, hasSession]

    InsightCard:
      type: object
      properties:
        modalityId:
          type: string
        modalityName:
          type: string
        emoji:
          type: string
        metric:
          type: string
          enum: [pain, energy, mood, rating]
        headline:
          type: string
          description: Plain-language correlation sentence shown on the insight card
        withSessionAvg:
          type: number
          description: Average metric score on days with a session for this modality
        withoutSessionAvg:
          type: number
          description: Average metric score on days without a session for this modality
        percentDiff:
          type: integer
          description: Improvement percentage (positive = better outcome with sessions)
        sessionCount:
          type: integer
        sparklineData:
          type: array
          items:
            $ref: "#/components/schemas/InsightSparklinePoint"
        whyItMatters:
          type: string
          description: Evidence-based explanation for the correlation
      required: [modalityId, modalityName, emoji, metric, headline, withSessionAvg, withoutSessionAvg, percentDiff, sessionCount, sparklineData, whyItMatters]

    AttentionItem:
      type: object
      properties:
        modalityId:
          type: string
        modalityName:
          type: string
        emoji:
          type: string
        message:
          type: string
          description: Human-readable explanation of why this modality needs attention
        daysSinceLastSession:
          type: integer
          nullable: true
      required: [modalityId, modalityName, emoji, message]

    InsightsResponse:
      type: object
      properties:
        id:
          type: string
        profileId:
          type: string
        insights:
          type: array
          items:
            $ref: "#/components/schemas/InsightCard"
          description: Top positive outcome correlations, sorted by impact
        attentionItems:
          type: array
          items:
            $ref: "#/components/schemas/AttentionItem"
          description: Plan modalities with zero sessions in the last 30 days
        wellnessScore:
          type: integer
          nullable: true
          description: Composite 0–100 score incorporating journal ratings, session completion rate, and trend direction
        journalCount:
          type: integer
          description: Total journal entries used for computation
        sessionCount:
          type: integer
          description: Total session logs
        refreshedAt:
          type: string
          format: date-time
      required: [insights, attentionItems, journalCount, sessionCount]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        details:
          type: object
          additionalProperties: true
      required:
        - error

    ModalityRecord:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        emoji:
          type: string
        category:
          type: string
        evidenceLevel:
          type: string
        costLow:
          type: integer
        costHigh:
          type: integer
        typicalFrequency:
          type: string
        hsaEligible:
          type: boolean
        description:
          type: string
        goals:
          type: array
          items:
            type: string
        conditions:
          type: array
          items:
            type: string
        preferenceMatch:
          type: array
          items:
            type: string
        exclusionIds:
          type: array
          items:
            type: string
        isActive:
          type: boolean
        lmnEligible:
          type: boolean
        evidenceSummary:
          type: string
          nullable: true
          description: AI-generated 300–500 word evidence summary for the public library page
        metaDescription:
          type: string
          nullable: true
          description: SEO meta description (140–160 chars)
        relatedModalities:
          type: array
          items:
            type: string
          description: IDs of related modalities shown at the bottom of the detail page
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - emoji
        - category
        - evidenceLevel
        - costLow
        - costHigh
        - typicalFrequency
        - hsaEligible
        - description
        - goals
        - conditions
        - preferenceMatch
        - exclusionIds
        - isActive
        - createdAt
        - updatedAt

    CreateModalityBody:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        emoji:
          type: string
        category:
          type: string
        evidenceLevel:
          type: string
        costLow:
          type: integer
        costHigh:
          type: integer
        typicalFrequency:
          type: string
        hsaEligible:
          type: boolean
        description:
          type: string
        goals:
          type: array
          items:
            type: string
        conditions:
          type: array
          items:
            type: string
        preferenceMatch:
          type: array
          items:
            type: string
        exclusionIds:
          type: array
          items:
            type: string
      required:
        - id
        - name
        - category
        - evidenceLevel
        - costLow
        - costHigh
        - typicalFrequency
        - description

    UpdateModalityBody:
      type: object
      properties:
        name:
          type: string
        emoji:
          type: string
        isActive:
          type: boolean
        costLow:
          type: integer
        costHigh:
          type: integer
        description:
          type: string

    IntakeRecord:
      type: object
      properties:
        id:
          type: string
        profileId:
          type: string
          nullable: true
        budget:
          type: integer
        goals:
          type: array
          items:
            type: string
        conditions:
          type: array
          items:
            type: string
        preferences:
          type: array
          items:
            type: string
        exclusions:
          type: array
          items:
            type: string
        zipCode:
          type: string
          nullable: true
        radius:
          type: integer
        telehealth:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - budget
        - goals
        - conditions
        - preferences
        - exclusions
        - radius
        - telehealth
        - createdAt

    CreateIntakeBody:
      type: object
      properties:
        profileId:
          type: string
        budget:
          type: integer
        goals:
          type: array
          items:
            type: string
        conditions:
          type: array
          items:
            type: string
        preferences:
          type: array
          items:
            type: string
        exclusions:
          type: array
          items:
            type: string
        zipCode:
          type: string
        radius:
          type: integer
        telehealth:
          type: boolean
      required:
        - budget
        - goals
        - conditions
        - preferences
        - exclusions
        - telehealth

    GeneratePlanBody:
      type: object
      properties:
        intakeId:
          type: string
        profileId:
          type: string
        budget:
          type: integer
        goals:
          type: array
          items:
            type: string
        conditions:
          type: array
          items:
            type: string
        preferences:
          type: array
          items:
            type: string
        exclusions:
          type: array
          items:
            type: string
        zipCode:
          type: string
        radius:
          type: integer
        telehealth:
          type: boolean
      required:
        - budget
        - goals
        - conditions
        - preferences
        - exclusions
        - telehealth

    PlanRecord:
      type: object
      properties:
        id:
          type: string
        profileId:
          type: string
          nullable: true
        intakeId:
          type: string
          nullable: true
        status:
          type: string
        totalMonthlyCost:
          type: integer
        budgetUtilization:
          type: integer
        budget:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - status
        - totalMonthlyCost
        - budgetUtilization
        - budget
        - createdAt
        - updatedAt

    PlanItemRecord:
      type: object
      properties:
        id:
          type: string
        planId:
          type: string
        modalityId:
          type: string
        score:
